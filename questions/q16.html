<script>
function checkBoxes() {
  var box1 = document.getElementById("myCheck1").checked;
  var box2 = document.getElementById("myCheck2").checked;
  var box3 = document.getElementById("myCheck3").checked;
  var box4 = document.getElementById("myCheck4").checked;
  var box5 = document.getElementById("myCheck5").checked;
  var box6 = document.getElementById("myCheck6").checked;
  var x = ~box1 & box2 & ~box3 & ~box4 & ~box5 & box6;
  var y = ~box1 & ~box2 & box3 & ~box4 & box5 & ~box6;
  var z = ~box1 & ~box2 & ~box3 & box4 & ~box5 & ~box6;
  document.getElementById("answ").innerHTML = !!(x | y | z);
}
</script>
