<div id="q7">
    <h1>Question 7</h1>

    <p>Click on the button below to get the output. It might change depending on what you have selected:</p>
    <select id="months" name="list">
      <option value="jan">January</option>
      <option value="feb">February</option>
      <option value="mar">March</option>
      <option value="apr">April</option>
      <option value="may">May</option>
      <option value="jun">June</option>
      <option value="jul">July</option>
      <option value="aug">August</option>
      <option value="sep">September</option>
      <option value="oct">October</option>
      <option value="nov">November</option>
      <option value="dec">December</option>
    </select>

    <button onclick="checkList()">?</button>
    <p> Output: <output id="answ"></output> </p>

</div>

<script>
function checkList() {
  var selection = document.getElementById("months").value;
  if (selection == "apr" | selection == "jun" | selection == "sep"
      | selection == "nov"){
    document.getElementById("answ").innerHTML = "true";
  }
  else{
    document.getElementById("answ").innerHTML = "false";
  }
}
</script>
