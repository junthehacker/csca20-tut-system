<!doctype html>
<html lang="en">
<head>

    <title>Question Demo</title>

<body>

<!--        START ADDING YOUR CODE HERE-->
<style>

.output-box {
  width: 50px;
  height: 50px;
}

.slidecontainer {
  width: 100%;
}

.slider {
  -webkit-appearance: none;
  width: 100%;
  height: 25px;
  background: #d3d3d3;
  outline: none;
  opacity: 0.7;
  -webkit-transition: .2s;
  transition: opacity .2s;
}

.slider:hover {
  opacity: 1;
}

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 25px;
  height: 25px;
  background: #4CAF50;
  cursor: pointer;
}

.slider::-moz-range-thumb {
  width: 25px;
  height: 25px;
  background: #4CAF50;
  cursor: pointer;
}

</style>


<div id="q3" class="container pt-2">
    <h1>Question 3</h1>

    <div class="slidecontainer">
      <input type="range" min="1" max="50" value="1" class="slider" id="myRange">
      <p>Value: <span id="out"></span></p>
      <p> Output: <span id="answ"></span></p>
    </div>

    <label>Type your answer here:</label>
    <input type="text" v-model="input" class="form-control" />

</div>

<script>
  var slider = document.getElementById("myRange");
  var output = document.getElementById("out");
  var answer = document.getElementById("answ");

  output.innerHTML = slider.value;
  answer.innerHTML = "false";

  slider.oninput = function() {
    output.innerHTML = this.value;
    if (this.value % 2 == 1){
      answer.innerHTML = "false";
    }
    else {
      answer.innerHTML = "true";
    }
  }


</script>

<!--        STOP HERE-->

</body>
</html>
