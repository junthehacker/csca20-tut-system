<style>
    .output-box {
        width: 50px;
        height: 50px;
    }
</style>

<div id="q0" class="container pt-2">

    <label>Type your answer here:</label>
    <input type="text" v-model="input" class="form-control" />

    <label>Output:</label>
    <div class="output-box" v-bind:style="{ backgroundColor: getTransformedColour() }"></div>
</div>

<script>

    const app = new Vue({
        el: "#q0",
        data: {
            input: "",
        },
        methods: {
            getTransformedColour() {
                let r = 0;
                let g = 0;
                let b = 0;
                for(let i = 0; i < this.input.length; i++) {
                    const charCode = this.input.charCodeAt(i);
                    r += Math.abs((charCode % 2 - 2) * 100 / charCode);
                    g += i * 0.2;
                    b += charCode;
                }

                r = Math.min(255, r);
                g = Math.min(255, g);
                b = Math.min(255, b);

                return `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
            }
        }
    })

</script>
